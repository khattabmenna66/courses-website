<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #c7e9e4, #8fd3c7);
    background-image: url("sign.up.2.jpeg");
    background-size:contain;
    background-repeat: no-repeat;
}
.right{
  width:70%;
  height:500;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
}
.form {
  background: white;
  padding: 35px;
  border-radius: 20px;
  width: 340px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.form-title {
  text-align: center;  
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 25px;
  color: #222;
}

.form label {
  font-size: 14px;
  color: #444;
  margin-bottom: 5px;
  display: block;
}

.input-container {
  margin-bottom: 18px;
}

.input-container input {
  width: 100%;
  padding: 14px 15px;
  border-radius: 30px;
  border: 1px solid #ddd;
  outline: none;
  font-size: 14px;
  background: #f7f9fc;
}

.input-container input:focus {
  border-color: #20bfa9;
  background: #fff;
  box-shadow: 0 0 6px rgba(32, 191, 169, 0.3);
}

.submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 30px;
  background: #20bfa9;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

.submit:hover {
  background: #17a589;
}

.form p:last-child {
  margin-top: 15px;
  font-size: 14px;
  text-align: center;
}

.form p span {
  color: #20bfa9;
  cursor: pointer;
  font-weight: 500;
  text-decoration: none;
}
  </style>
</head>
<body>
  <div class="left"></div>

  <div class="right"></div>
     <form class="form">
  <p class="form-title">Welcome back</p>

  <label>Email</label>
  <div class="input-container">
      <input type="email" placeholder="Enter email">
  </div>

  <label>Password</label>
  <div class="input-container">
      <input type="password" placeholder="Enter password">
  </div>

  <button type="submit" class="submit">
      Login
  </button>

  <p>Don't have an account? &nbsp;<a href="sign up.html">Sign up</a></p>
</form>
</body>
</html>
