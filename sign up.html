<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account</title>
  <script>
    function toggle(){
  let p = document.getElementById("pass");
  p.type = p.type === "password" ? "text" : "password";
}
  </script>
  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
    background-image: url("sign.up.2.jpeg");
    background-size:contain;
    background-repeat: no-repeat;
}

.page{
  display:flex;
  width:100%;
  height:100vh;

}

/* LEFT */
.left{
  width:100%;
    background-size:auto;

}

/* RIGHT */
.right{
  width:30%;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;


}

/* FORM */
.form{
  width:65%;

}

.logo{
  font-weight:bold;
  margin-bottom:20px;
}

h1{
  margin-bottom:25px;
}

label{
  display:block;
  margin:10px 0 5px;
  color:#45a15b;
}

.input{
  display:flex;
  align-items:center;
  gap:20px;
  background:#eef3f6;
  padding:14px;
  border-radius:30px;
  margin-bottom:10px;
}

.icon{
  width:20px;
  height:20px;
  stroke:#8aa0a6;
  fill:none;
  stroke-width:2;
}

.input input{
  border:none;
  outline:none;
  background:none;
  flex:1;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(to right,#00b894,#00d084);
  color:#287e4d;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;

}

.login{
  text-align:center;
  margin-top:15px;
}

.login span{
  color:#174a1c;
  cursor:pointer;
}

.social{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.circle{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#eef3f6;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 8px;
  cursor:pointer;
  transition:0.3s;

}

.circle:hover{
  background:#dfe9ee;
}

.social-icon{
  width:22px;
  height:22px;
  stroke:#8aa0a6;
  fill:none;
  stroke-width:1.8;
}

.eye{
  cursor:pointer;
}

  </style>
</head>
<body>

<div class="page">

  <!-- LEFT -->
  <div class="left"></div>


  <!-- RIGHT -->
  <div class="right">
    <div class="form">

      <div class="logo">
         <span>GLOBAL LEARNING</span>
      </div>

      <h1>Create Account</h1>

      <!-- NAME -->
      <label>Full Name</label>
      <div class="input">
        <svg viewBox="0 0 24 24" class="icon">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
        </svg>
        <input type="text">
      </div>

      <!-- EMAIL -->
      <label>Email</label>
      <div class="input">
        <svg viewBox="0 0 24 24" class="icon">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M3 7l9 6 9-6"/>
        </svg>
        <input type="email">
      </div>

      <!-- PASSWORD -->
      <label>Password</label>
      <div class="input">
        <svg viewBox="0 0 24 24" class="icon">
          <circle cx="7" cy="12" r="3"/>
          <path d="M10 12h10m-3 0v3m-3-3v3"/>
        </svg>

        <input type="password" id="pass">

        <svg onclick="toggle()" class="icon eye" viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>

      <button class="btn">Create Account</button>

      <p class="login">
        Already have an account? <span></span><a href="login.html" class="login">Login </a>
      </p>

      <!-- SOCIAL -->
      <div class="social">

        <div class="circle">
          <svg viewBox="0 0 24 24" class="social-icon">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
            <path d="M21 12h-9"/>
          </svg>
        </div>

        <div class="circle">
          <svg viewBox="0 0 24 24" class="social-icon">
            <path d="M12 2a10 10 0 0 0-3 19.5c.5.1.7-.2.7-.5v-2c-3 .7-3.6-1.2-3.6-1.2-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 .1 1.6 1 1.6 1 .9 1.5 2.4 1 3 .8.1-.6.3-1 .6-1.2-2.4-.3-5-1.2-5-5.2 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.6 0 0 .9-.3 2.8 1a9.7 9.7 0 0 1 5 0c1.9-1.3 2.8-1 2.8-1 .5 1.3.2 2.3.1 2.6.6.7 1 1.6 1 2.7 0 4-2.6 4.9-5 5.2.3.3.6.8.6 1.6v2.4c0 .3.2.6.7.5A10 10 0 0 0 12 2z"/>
          </svg>
        </div>

      </div>

    </div>
  </div>

</div>
</body>
</html>
